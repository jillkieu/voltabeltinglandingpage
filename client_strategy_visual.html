<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lý do chọn ít khách hàng hơn (Dark Mode)</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Warm Dark Mode & Line Art Palette */
      --bg-dark: #0a0a0a;       /* Nền đen sâu thẳm sang trọng */
      --text-light: #fcf9f5;     /* Nét chữ trắng ngà sạch sẽ */
      --text-muted: #a3a3a3;     /* Chữ phụ màu xám sáng */
      --accent-orange: #e87750;  /* Màu cam đất thương hiệu của Tony */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-dark); 
      display: flex;
      justify-content: center;
      align-items: center;
      width: 1080px;
      height: 1080px; /* Hình vuông tuyệt đối 1:1 */
      margin: 0;
      padding: 0;
      overflow: hidden;
      color: var(--text-light);
    }

    /* Container holding the visual board (Clean Minimalism Square in Dark Mode) */
    .board-wrapper {
      background-color: var(--bg-dark);
      padding: 95px 50px; 
      border-radius: 20px;
      border: 2.5px solid var(--text-light); /* Viền trắng mảnh line art dày dặn hơn */
      width: 1020px;
      height: 1020px; 
      display: flex;
      flex-direction: column;
      justify-content: center; /* Căn giữa hoàn toàn nội dung theo chiều dọc */
      align-items: center;
      position: relative;
    }

    /* Logo Brand Watermark */
    .logo-container {
      position: absolute;
      top: 45px;
      left: 50px;
      display: flex;
      align-items: center;
    }

    .logo-img {
      height: 40px;
      width: auto;
      opacity: 0.9;
    }

    /* Concept Visualization Area */
    .visual-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0 10px;
      position: relative;
    }

    /* Cột biểu thị từng trạng thái */
    .visual-column {
      width: 43%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Tăng size chữ vượt bậc của State Tag - Font Inter Bold siêu nét */
    .visual-column span.state-tag {
      font-size: 26px; /* Tăng rõ rệt từ 21px lên 26px */
      font-weight: 900; /* Siêu đậm nét */
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 35px;
    }

    .column-left span.state-tag {
      color: var(--text-muted);
    }

    .column-right span.state-tag {
      color: var(--accent-orange);
    }

    /* SVG Canvas vẽ tay line-art tối giản trừu tượng */
    .graphic-box {
      width: 280px;
      height: 280px;
      background: #141414; /* Nền xám đen rất nhẹ tạo khối hộp */
      border: 2px solid var(--text-light);
      border-radius: 16px;
      box-shadow: 4px 4px 0px rgba(252, 249, 245, 0.05);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Box bên phải phá vỡ ranh giới (mở toang góc trên và phải) */
    .graphic-box.unlocked {
      background: transparent;
      border: none;
      box-shadow: none;
    }

    /* Tạo các đường viền giả cho box bên phải chỉ giữ lại cạnh dưới và cạnh trái */
    .graphic-box.unlocked::before {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2.5px;
      background-color: var(--text-light);
    }

    .graphic-box.unlocked::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 2.5px;
      height: 100%;
      background-color: var(--text-light);
    }

    /* Tăng size chữ Caption Text bên dưới để đọc siêu dễ dàng, dùng phông Inter nét căng */
    .caption-text {
      font-size: 23px; /* Tăng từ 20px lên 23px cực kỳ dễ đọc */
      font-weight: 600;
      margin-top: 35px;
      line-height: 1.5;
      max-width: 350px; /* Nới rộng độ rộng dòng chữ */
    }

    .column-left .caption-text {
      color: var(--text-muted);
    }

    .column-right .caption-text {
      color: var(--text-light);
    }

    /* Cầu nối / Mũi tên chuyển giao ở giữa */
    .transition-bridge {
      width: 14%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .transition-arrow {
      width: 80px; /* Tăng độ rộng mũi tên */
      height: 2px;
      background-color: var(--text-light);
      position: relative;
      margin-bottom: 15px;
    }

    .transition-arrow::after {
      content: '';
      position: absolute;
      right: -2px;
      top: -5px;
      width: 12px;
      height: 12px;
      border-top: 2px solid var(--text-light);
      border-right: 2px solid var(--text-light);
      transform: rotate(45deg);
    }

    /* Tăng size của Bridge Tag và dùng font Inter nét đậm */
    .bridge-tag {
      background-color: var(--accent-orange);
      color: #ffffff;
      border: 1.5px solid var(--text-light);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 15px; /* Tăng từ 13.5px lên 15px */
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>

  <div class="board-wrapper" id="capture-area">

    <!-- Logo Brand Watermark (Góc trên bên trái) -->
    <div class="logo-container">
      <img src="cropped-favicon.png" class="logo-img" alt="Logo">
    </div>
    
    <!-- Visual Container -->
    <div class="visual-container">
      
      <!-- Column Left: Chaotic / Many Clients -->
      <div class="visual-column column-left">
        <span class="state-tag">Nhiều khách hàng</span>
        
        <div class="graphic-box">
          <!-- SVG: Mạng lưới rối rắm đại diện cho việc phân tán lực -->
          <svg width="280" height="280" style="position: absolute; top:0; left:0;">
            <!-- Các đường kết nối chéo lộn xộn tạo cảm giác quá tải -->
            <path d="M 50 60 L 220 210 M 95 45 L 170 240 M 140 35 L 110 240 M 185 45 L 60 210 M 230 60 L 35 130 M 245 110 L 60 210 M 250 160 L 50 60" 
                  fill="none" stroke="#2c2c2c" stroke-width="1" />
            
            <!-- Các nhánh kết nối từ tâm ra các Client nhỏ -->
            <line x1="140" y1="140" x2="50" y2="60" stroke="var(--text-muted)" stroke-width="1.5" stroke-dasharray="3 2" />
            <line x1="140" y1="140" x2="95" y2="45" stroke="var(--text-muted)" stroke-width="1.5" />
            <line x1="140" y1="140" x2="140" y2="35" stroke="var(--text-muted)" stroke-width="1.5" stroke-dasharray="2 2" />
            <line x1="140" y1="140" x2="185" y2="45" stroke="var(--text-muted)" stroke-width="1.5" />
            <line x1="140" y1="140" x2="230" y2="60" stroke="var(--text-muted)" stroke-width="1.5" stroke-dasharray="3 2" />
            <line x1="140" y1="140" x2="245" y2="110" stroke="var(--text-muted)" stroke-width="1.5" />
            <line x1="140" y1="140" x2="250" y2="160" stroke="var(--text-muted)" stroke-width="1.5" stroke-dasharray="2 2" />
            <line x1="140" y1="140" x2="220" y2="210" stroke="var(--text-muted)" stroke-width="1.5" />
            <line x1="140" y1="140" x2="170" y2="240" stroke="var(--text-muted)" stroke-width="1.5" stroke-dasharray="3 2" />
            <line x1="140" y1="140" x2="110" y2="240" stroke="var(--text-muted)" stroke-width="1.5" />
            <line x1="140" y1="140" x2="60" y2="210" stroke="var(--text-muted)" stroke-width="1.5" stroke-dasharray="2 2" />
            <line x1="140" y1="140" x2="35" y2="130" stroke="var(--text-muted)" stroke-width="1.5" />

            <!-- Nhân vật trung tâm bị bóp nghẹt -->
            <circle cx="140" cy="140" r="10" fill="#141414" stroke="var(--text-muted)" stroke-width="2" />
            <circle cx="140" cy="140" r="4" fill="var(--text-muted)" />

            <!-- 12 Clients nhỏ bao quanh, mờ nhạt -->
            <circle cx="50" cy="60" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
            <circle cx="95" cy="45" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
            <circle cx="140" cy="35" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
            <circle cx="185" cy="45" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
            <circle cx="230" cy="60" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
            <circle cx="245" cy="110" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
            <circle cx="250" cy="160" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
            <circle cx="220" cy="210" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
            <circle cx="170" cy="240" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
            <circle cx="110" cy="240" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
            <circle cx="60" cy="210" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
            <circle cx="35" cy="130" r="5" fill="#3a3a3a" stroke="var(--text-muted)" stroke-width="1" />
          </svg>
        </div>
        
        <div class="caption-text">
          Phân tán nguồn lực, kiệt sức vì vận hành, luôn phải chạy theo pitching tìm khách, áp lực cao.
        </div>
      </div>

      <!-- Transition Bridge -->
      <div class="transition-bridge">
        <div class="transition-arrow"></div>
        <div class="bridge-tag">Tập trung chất</div>
      </div>

      <!-- Column Right: Depth / Few Clients -->
      <div class="visual-column column-right">
        <span class="state-tag">Ít khách hàng</span>
        
        <div class="graphic-box unlocked">
          <!-- SVG: Mạng lưới tinh gọn, kết nối sâu sắc, lan tỏa giá trị lớn -->
          <svg width="280" height="280" style="position: absolute; top:0; left:0;">
            <!-- 3 đường kết nối dày dặn màu cam thương hiệu Tony -->
            <line x1="140" y1="140" x2="140" y2="50" stroke="var(--accent-orange)" stroke-width="4.5" stroke-linecap="round" />
            <line x1="140" y1="140" x2="60" y2="190" stroke="var(--accent-orange)" stroke-width="4.5" stroke-linecap="round" />
            <line x1="140" y1="140" x2="220" y2="190" stroke="var(--accent-orange)" stroke-width="4.5" stroke-linecap="round" />

            <!-- Nhân vật trung tâm vững chãi, tỏa sáng nhẹ -->
            <circle cx="140" cy="140" r="24" fill="rgba(252, 249, 245, 0.04)" />
            <circle cx="140" cy="140" r="14" fill="var(--bg-dark)" stroke="var(--text-light)" stroke-width="2.5" />
            <circle cx="140" cy="140" r="6" fill="var(--text-light)" />

            <!-- Client Node 1 (Phía trên) - Thiết kế phát sáng, tỏa giá trị -->
            <circle cx="140" cy="50" r="28" fill="rgba(232, 119, 80, 0.12)" />
            <circle cx="140" cy="50" r="15" fill="var(--bg-dark)" stroke="var(--text-light)" stroke-width="2.5" />
            <circle cx="140" cy="50" r="6" fill="var(--accent-orange)" />
            <path d="M 115 30 A 28 28 0 0 1 165 30" fill="none" stroke="var(--accent-orange)" stroke-width="2" stroke-linecap="round" />
            <path d="M 105 20 A 42 42 0 0 1 175 20" fill="none" stroke="var(--accent-orange)" stroke-width="1.5" stroke-dasharray="3 3" stroke-linecap="round" />

            <!-- Client Node 2 (Dưới trái) - Tỏa sóng giá trị -->
            <circle cx="60" cy="190" r="28" fill="rgba(232, 119, 80, 0.12)" />
            <circle cx="60" cy="190" r="15" fill="var(--bg-dark)" stroke="var(--text-light)" stroke-width="2.5" />
            <circle cx="60" cy="190" r="6" fill="var(--accent-orange)" />
            <path d="M 40 210 A 28 28 0 0 1 40 170" fill="none" stroke="var(--accent-orange)" stroke-width="2" stroke-linecap="round" />
            <path d="M 30 220 A 42 42 0 0 1 30 160" fill="none" stroke="var(--accent-orange)" stroke-width="1.5" stroke-dasharray="3 3" stroke-linecap="round" />

            <!-- Client Node 3 (Dưới phải) - Tỏa sóng giá trị -->
            <circle cx="220" cy="190" r="28" fill="rgba(232, 119, 80, 0.12)" />
            <circle cx="220" cy="190" r="15" fill="var(--bg-dark)" stroke="var(--text-light)" stroke-width="2.5" />
            <circle cx="220" cy="190" r="6" fill="var(--accent-orange)" />
            <path d="M 240 170 A 28 28 0 0 1 240 210" fill="none" stroke="var(--accent-orange)" stroke-width="2" stroke-linecap="round" />
            <path d="M 250 160 A 42 42 0 0 1 250 220" fill="none" stroke="var(--accent-orange)" stroke-width="1.5" stroke-dasharray="3 3" stroke-linecap="round" />
          </svg>
        </div>
        
        <div class="caption-text">
          Dồn 100% tâm huyết, tạo giá trị sâu sắc, đồng hành bền vững cùng phát triển.
        </div>
      </div>

    </div>

  </div>

</body>
</html>
